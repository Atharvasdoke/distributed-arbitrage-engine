syntax = "proto3";

package arbitrage;

option go_package = "core/pb";

service ArbitrageService {
  rpc ReportPrice (ReportPriceRequest) returns (ReportPriceResponse) {}
}

message Product {
  int32 id = 1;
  string name = 2;
  string sku = 3;
}

message Retailer {
  int32 id = 1;
  string name = 2;
  string url = 3;
}

message PriceData {
  int32 product_id = 1;
  int32 retailer_id = 2;
  double price = 3;
  string currency = 4;
}

message ReportPriceRequest {
  repeated PriceData prices = 1;
}

message ReportPriceResponse {
  bool success = 1;
  string message = 2;
}
