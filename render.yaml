databases:
  - name: arbitrage-db
    databaseName: arbitrage
    user: arbitrage_user
    plan: free

services:
  - type: web
    name: arbitrage-backend
    env: go
    buildCommand: "./render-build.sh"
    startCommand: "cd core && ./arbitrage-api"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arbitrage-db
          property: connectionString
